<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otimizador de Tempo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Meu Tempo Livre</h1>
        
        <div class="status-panel">
            <p>Próximo compromisso: <strong id="proximo-compromisso">16:00 - Reunião</strong></p>
        </div>

        <button id="btn-terminei">Terminei agora!</button>

        <div id="area-sugestoes" class="escondido">
            <h2>Sugestões para o seu tempo livre (<span id="tempo-disponivel">0</span> min):</h2>
            <ul id="lista-tarefas">
                </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
