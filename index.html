<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leitor Rápido (OCR + WPM)</title>
    <!-- React e ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel para interpretar JSX diretamente -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-neutral-50">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      function classNames(...args) {
        return args.filter(Boolean).join(" ");
      }

      const DEFAULT_TEXT = `Cole ou carregue um texto aqui, ou envie imagens/páginas para OCR.\n\nDicas:\n• Ajuste as palavras por minuto (WPM) no controle abaixo.\n• Escolha o tamanho do bloco (1–3 palavras).\n• Ative a pausa de pontuação para respiradas naturais.\n• Você pode colar capítulos inteiros do livro em TXT, ou usar OCR nas fotos.\n`;

      function tokenizeToChunks(text, chunkSize = 1) {
        const cleaned = text
          .replace(/[\r\t]+/g, " ")
          .replace(/\n+/g, " \n ")
          .replace(/\s{2,}/g, " ")
          .trim();

        const words = cleaned.split(/\s+/);
        const chunks = [];
        for (let i = 0; i < words.length; i += chunkSize) {
          const slice = words.slice(i, i + chunkSize);
          chunks.push(slice.join(" "));
        }
        return chunks;
      }

      function isSentenceEnd(token) {
        return /[\.!?…]$/.test(token);
      }
      function isLineBreak(token) {
        return token === "\\n" || /\\n/.test(token);
      }

      function useExternalScript(src) {
        const [loaded, setLoaded] = useState(false);
        useEffect(() => {
          let el = document.querySelector(`script[src="${src}"]`);
          if (!el) {
            el = document.createElement("script");
            el.src = src;
            el.async = true;
            el.onload = () => setLoaded(true);
            el.onerror = () => setLoaded(false);
            document.body.appendChild(el);
          } else {
            setLoaded(true);
          }
        }, [src]);
        return loaded;
      }

      function App() {
        const [rawText, setRawText] = useState(() => localStorage.getItem("sr_rawText") || DEFAULT_TEXT);
        const [wpm, setWpm] = useState(() => Number(localStorage.getItem("sr_wpm")) || 300);
        const [chunkSize, setChunkSize] = useState(() => Number(localStorage.getItem("sr_chunkSize")) || 1);
        const [punctuationPause, setPunctuationPause] = useState(() => localStorage.getItem("sr_punctPause") === "true");
        const [extraPauseMs, setExtraPauseMs] = useState(() => Number(localStorage.getItem("sr_extraPauseMs")) || 250);
        const [isPlaying, setIsPlaying] = useState(false);
        const [index, setIndex] = useState(0);

        const chunks = useMemo(() => tokenizeToChunks(rawText, chunkSize), [rawText, chunkSize]);
        const baseIntervalMs = useMemo(() => {
          const blocksPerMinute = Math.max(1, wpm / Math.max(1, chunkSize));
          return Math.round(60000 / blocksPerMinute);
        }, [wpm, chunkSize]);

        const timerRef = useRef(null);
        useEffect(() => localStorage.setItem("sr_rawText", rawText), [rawText]);
        useEffect(() => localStorage.setItem("sr_wpm", String(wpm)), [wpm]);
        useEffect(() => localStorage.setItem("sr_chunkSize", String(chunkSize)), [chunkSize]);
        useEffect(() => localStorage.setItem("sr_punctPause", String(punctuationPause)), [punctuationPause]);
        useEffect(() => localStorage.setItem("sr_extraPauseMs", String(extraPauseMs)), [extraPauseMs]);

        useEffect(() => {
          if (!isPlaying) return;
          function tick() {
            setIndex((prev) => {
              const next = prev + 1;
              if (next >= chunks.length) return prev;
              return next;
            });
          }
          let interval = baseIntervalMs;
          const currentToken = chunks[index] || "";
          if (punctuationPause && (isSentenceEnd(currentToken) || isLineBreak(currentToken))) {
            interval += extraPauseMs;
          }
          timerRef.current = setTimeout(tick, interval);
          return () => clearTimeout(timerRef.current);
        }, [isPlaying, index, chunks, baseIntervalMs, punctuationPause, extraPauseMs]);

        function handlePlayPause() { if (chunks.length > 0) setIsPlaying((p) => !p); }
        function handleStop() { setIsPlaying(false); setIndex(0); }
        function handlePrev() { setIndex((i) => Math.max(0, i - 1)); }
        function handleNext() { setIndex((i) => Math.min(chunks.length - 1, i + 1)); }

        const tesseractLoaded = useExternalScript("https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js");
        const [ocrRunning, setOcrRunning] = useState(false);
        const [ocrProgress, setOcrProgress] = useState(0);

        async function runOCRonFiles(fileList) {
          if (!window.Tesseract) return alert("Tesseract.js ainda não carregou.");
          const { createWorker } = window.Tesseract;
          setOcrRunning(true);
          setOcrProgress(0);
          const worker = await createWorker({ logger: (m) => {
            if (m.status === "recognizing text" && m.progress != null) {
              setOcrProgress(Math.round(m.progress * 100));
            }
          }});
          await worker.loadLanguage("por+eng");
          await worker.initialize("por+eng");
          let combined = "";
          for (let i = 0; i < fileList.length; i++) {
            const file = fileList[i];
            const imgURL = URL.createObjectURL(file);
            const { data } = await worker.recognize(imgURL);
            combined += "\n\n" + data.text;
            URL.revokeObjectURL(imgURL);
          }
          await worker.terminate();
          setRawText((prev) => (prev ? prev + "\n\n" + combined : combined));
          setOcrRunning(false);
          setOcrProgress(100);
        }

        const pdfjsLoaded = useExternalScript("https://unpkg.com/pdfjs-dist@2.16.105/build/pdf.min.js");
        useEffect(() => {
          if (window.pdfjsLib) {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc =
              "https://unpkg.com/pdfjs-dist@2.16.105/build/pdf.worker.min.js";
          }
        }, [pdfjsLoaded]);

        async function extractTextFromPDF(file) {
          if (!window.pdfjsLib) return alert("PDF.js ainda não carregou.");
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          let out = "";
          for (let p = 1; p <= pdf.numPages; p++) {
            const page = await pdf.getPage(p);
            const content = await page.getTextContent();
            const strings = content.items.map((it) => it.str);
            out += strings.join(" ") + "\n\n";
          }
          setRawText((prev) => (prev ? prev + "\n\n" + out : out));
        }

        function downloadText() {
          const blob = new Blob([rawText], { type: "text/plain;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "texto_leitura.txt";
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        }

        function importTextFile(file) {
          const reader = new FileReader();
          reader.onload = () => setRawText(String(reader.result || ""));
          reader.readAsText(file, "utf-8");
        }

        const progress = chunks.length > 0 ? Math.round(((index + 1) / chunks.length) * 100) : 0;

        return (
          <div className="min-h-screen bg-neutral-50 text-neutral-900">
            <header className="sticky top-0 z-10 bg-white border-b border-neutral-200">
              <div className="mx-auto max-w-5xl px-4 py-3 flex items-center justify-between">
                <h1 className="text-xl sm:text-2xl font-semibold">Leitor Rápido (OCR + WPM)</h1>
                <div className="text-xs text-neutral-500">Beta • tudo local</div>
              </div>
            </header>
            <main className="mx-auto max-w-5xl px-4 py-6 grid grid-cols-1 lg:grid-cols-5 gap-6">
              <section className="lg:col-span-2">
                <div className="bg-white rounded-2xl shadow p-4 space-y-4">
                  <h2 className="text-lg font-medium">Fonte do texto</h2>
                  <textarea className="w-full h-40 border p-3 rounded-xl" value={rawText} onChange={(e) => setRawText(e.target.value)} />
                  <button onClick={downloadText}>Exportar TXT</button>
                  <input type="file" accept=".txt" onChange={(e)=>e.target.files&&importTextFile(e.target.files[0])} />
                  <input type="file" accept="application/pdf" onChange={(e)=>{const f=e.target.files?.[0];if(f) extractTextFromPDF(f);}} />
                  <input type="file" multiple accept="image/*" onChange={(e)=>{const files=e.target.files;if(files&&files.length) runOCRonFiles(files);}} />
                  {ocrRunning && <div>{ocrProgress}%</div>}
                </div>
              </section>
              <section className="lg:col-span-3">
                <div className="bg-white rounded-2xl shadow p-4">
                  <h2>Leitura</h2>
                  <div className="h-56 bg-neutral-900 text-white grid place-items-center rounded-xl">
                    <div className="text-3xl">{chunks[index] || "–"}</div>
                  </div>
                  <div>
                    <label>WPM: {wpm}</label>
                    <input type="range" min={100} max={1200} step={10} value={wpm} onChange={(e)=>setWpm(Number(e.target.value))} />
                  </div>
                  <button onClick={handlePrev}>Anterior</button>
                  <button onClick={handlePlayPause}>{isPlaying ? "Pausar" : "Ler"}</button>
                  <button onClick={handleNext}>Próximo</button>
                  <button onClick={handleStop}>Parar</button>
                </div>
              </section>
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>
  </body>
</html>
